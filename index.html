<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results_summary_component</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="result">
      <h2 class="title">Your Result</h2>
        <div class="image">
          <h1>76</h1>
          <p>of 100</p>
        </div>
      <h1>Great</h1>
      <h3>You scored higher than 65% of the people who have taken these tests.</h3>
    </div>
<div class="summary">
      <h2>Summary</h2>

        <div class="rectangles">    
      
            <div class="rea">
              <div><img src="icon-reaction.svg" alt="">Reaction</div> <div><span>80 </span>  / 100</div>
            </div>

            <div class="mem">
              <div><img src="icon-memory.svg">Memory</div> <div><span>92</span> / 100</div>
            </div>
            
            <div class="ver">
              <div><img src="icon-verbal.svg" alt="">Verbal</div> <div><span>61</span> / 100</div>
            </div>

            <div class="vis">
              <div><img src="icon-visual.svg" alt="">Visual</div> <div><span>73</span> / 100</div>
            </div>

      </div>

      <button>Continue</button>
  </div>
</body>
</html>
